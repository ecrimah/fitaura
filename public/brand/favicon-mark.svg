<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E5612D"/>
      <stop offset="100%" stop-color="#B83F1E"/>
    </linearGradient>
  </defs>
  <!-- High-contrast sienna brand square. A bold cream "F" with a small
       cream dot above the bar reads cleanly even at 16x16 because there
       are only two shapes against a saturated background. -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- F glyph, optically centered. Stroke-like geometry instead of a font
       so it stays crisp at any rasterization size. -->
  <g fill="#FBF7F1">
    <!-- Vertical bar -->
    <rect x="148" y="108" width="68" height="296" rx="6"/>
    <!-- Top horizontal -->
    <rect x="148" y="108" width="220" height="68" rx="6"/>
    <!-- Middle horizontal (slightly shorter, mid-height) -->
    <rect x="148" y="222" width="172" height="56" rx="6"/>
  </g>
  <!-- Ink accent dot in the corner, distinctive at any size -->
  <circle cx="392" cy="386" r="34" fill="#26261F"/>
</svg>
