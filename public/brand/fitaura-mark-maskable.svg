<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5612D"/>
      <stop offset="100%" stop-color="#B83F1E"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed brand background   required for maskable PWA icons.
       The visible logomark must fit inside the inner 80% safe-zone circle
       (radius H 205, centered). -->
  <rect width="512" height="512" fill="#26261F"/>
  <g transform="translate(256 285)">
    <text x="0" y="0" font-family="'Anton','Impact','Bebas Neue',sans-serif" font-size="210" font-weight="400" fill="#FBF7F1" text-anchor="middle" letter-spacing="-4">F<tspan fill="url(#accent)">I</tspan>T</text>
    <rect x="-90" y="32" width="180" height="5" rx="2.5" fill="#D14F2B" opacity="0.85"/>
    <text x="0" y="80" font-family="'Inter','Helvetica','Arial',sans-serif" font-size="30" font-weight="600" fill="#FBF7F1" text-anchor="middle" letter-spacing="12" opacity="0.78">AURA</text>
  </g>
</svg>
