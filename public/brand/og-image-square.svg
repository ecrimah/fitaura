<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBF7F1"/>
      <stop offset="100%" stop-color="#F0E8DD"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5612D"/>
      <stop offset="100%" stop-color="#B83F1E"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- Decorative band -->
  <rect x="0" y="0" width="1200" height="120" fill="#D14F2B" opacity="0.10"/>
  <rect x="0" y="1080" width="1200" height="120" fill="#26261F"/>

  <!-- Eyebrow -->
  <text x="600" y="380" font-family="'Inter','Helvetica','Arial',sans-serif" font-size="24" font-weight="600" fill="#26261F" letter-spacing="10" text-anchor="middle" opacity="0.6">MODERN LIFESTYLE CLOTHING</text>

  <!-- Brand wordmark -->
  <text x="600" y="600" font-family="'Anton','Impact','Bebas Neue',sans-serif" font-size="220" font-weight="400" fill="#26261F" letter-spacing="-4" text-anchor="middle">F<tspan fill="url(#accent)">I</tspan>TAURA</text>

  <!-- Accent rule -->
  <rect x="500" y="640" width="200" height="6" rx="3" fill="#D14F2B"/>

  <!-- Tagline -->
  <text x="600" y="730" font-family="'Inter','Helvetica','Arial',sans-serif" font-size="40" font-weight="500" fill="#494945" text-anchor="middle">Confidence In Motion.</text>

  <!-- Subline -->
  <text x="600" y="800" font-family="'Inter','Helvetica','Arial',sans-serif" font-size="26" font-weight="400" fill="#6B6B66" text-anchor="middle">Gymwear � Athleisure � Fashion-forward apparel</text>

  <!-- Domain bar -->
  <text x="600" y="1148" font-family="'Inter','Helvetica','Arial',sans-serif" font-size="22" font-weight="600" fill="#FBF7F1" letter-spacing="6" text-anchor="middle">SHOPFITAURA.COM</text>
</svg>
